name: Deploy to GitHub Pages

# Builds the Astro static site and publishes dist/ to GitHub Pages.
# Triggered on every push to main, and can be run manually from the Actions tab.
#
# Requirements (one-time setup):
#   1. GitHub repo → Settings → Pages → Source = "GitHub Actions"
#   2. public/CNAME already contains french.milovicake.ru
#   3. DNS: CNAME `french` → <username>.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-progress deploy at a time, but let queued runs finish
# (no cancel-in-progress — half-published sites are worse than slightly stale ones).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check Astro project
        run: npm run check

      - name: Security audit
        run: npm run audit:security

      - name: Build site
        run: npm run build
        env:
          NODE_ENV: production

      - name: Install audit Python dependencies
        run: python3 -m pip install --user pillow beautifulsoup4

      - name: Audit generated site
        run: npm run audit:site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
