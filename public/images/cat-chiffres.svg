<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 562" width="900" height="562" role="img" aria-label="Chiffres Gourmands">
  <defs>
    <linearGradient id="c4-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2528"/>
      <stop offset="60%" stop-color="#06141a"/>
      <stop offset="100%" stop-color="#020608"/>
    </linearGradient>
    <linearGradient id="c4-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0CE8E"/>
      <stop offset="100%" stop-color="#A07636"/>
    </linearGradient>
    <pattern id="c4-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#D4A96A" stroke-width="0.3" opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="900" height="562" fill="url(#c4-bg)"/>
  <rect width="900" height="562" fill="url(#c4-grid)"/>
  <!-- Bar chart -->
  <g transform="translate(450 350)">
    <line x1="-280" y1="0" x2="280" y2="0" stroke="url(#c4-gold)" stroke-width="0.8" opacity="0.7"/>
    <line x1="-280" y1="0" x2="-280" y2="-220" stroke="url(#c4-gold)" stroke-width="0.8" opacity="0.7"/>
    <g fill="url(#c4-gold)" opacity="0.85">
      <rect x="-240" y="-60"  width="40" height="60"/>
      <rect x="-180" y="-100" width="40" height="100"/>
      <rect x="-120" y="-90"  width="40" height="90"/>
      <rect x="-60"  y="-150" width="40" height="150"/>
      <rect x="0"    y="-130" width="40" height="130"/>
      <rect x="60"   y="-180" width="40" height="180"/>
      <rect x="120"  y="-160" width="40" height="160"/>
      <rect x="180"  y="-200" width="40" height="200"/>
    </g>
    <!-- trend line -->
    <polyline points="-220,-60 -160,-100 -100,-90 -40,-150 20,-130 80,-180 140,-160 200,-200" fill="none" stroke="#fff" stroke-width="1.4" opacity="0.65"/>
    <g fill="#fff" opacity="0.7">
      <circle cx="-220" cy="-60"  r="3"/>
      <circle cx="-160" cy="-100" r="3"/>
      <circle cx="-100" cy="-90"  r="3"/>
      <circle cx="-40"  cy="-150" r="3"/>
      <circle cx="20"   cy="-130" r="3"/>
      <circle cx="80"   cy="-180" r="3"/>
      <circle cx="140"  cy="-160" r="3"/>
      <circle cx="200"  cy="-200" r="3"/>
    </g>
  </g>
  <!-- Big number -->
  <text x="450" y="170" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="72" fill="url(#c4-gold)" letter-spacing="-3">€ 14,2 mrd</text>
  <text x="450" y="200" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="16" fill="#E8DCC8" opacity="0.65">marché de la pâtisserie française</text>
  <rect x="36" y="36" width="828" height="490" fill="none" stroke="url(#c4-gold)" stroke-width="0.6" opacity="0.45"/>
  <text x="450" y="500" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="6" fill="url(#c4-gold)" opacity="0.85">CHIFFRES • ANALYTICS</text>
</svg>
