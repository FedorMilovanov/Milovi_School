<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 562" width="900" height="562" role="img" aria-label="Техники">
  <defs>
    <linearGradient id="c2-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2e"/>
      <stop offset="60%" stop-color="#16161a"/>
      <stop offset="100%" stop-color="#08080a"/>
    </linearGradient>
    <linearGradient id="c2-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0CE8E"/>
      <stop offset="100%" stop-color="#A07636"/>
    </linearGradient>
    <pattern id="c2-grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#D4A96A" stroke-width="0.25" opacity="0.18"/>
    </pattern>
  </defs>
  <rect width="900" height="562" fill="url(#c2-bg)"/>
  <rect width="900" height="562" fill="url(#c2-grid)"/>
  <!-- Layered cake cross-section (millefeuille technique) -->
  <g transform="translate(450 280)" stroke="url(#c2-gold)" stroke-width="1.2" fill="none" opacity="0.9">
    <rect x="-160" y="-90" width="320" height="14" fill="#3a2a1c"/>
    <rect x="-160" y="-72" width="320" height="22" fill="#5a3a22" opacity="0.7"/>
    <rect x="-160" y="-46" width="320" height="14" fill="#3a2a1c"/>
    <rect x="-160" y="-28" width="320" height="22" fill="#5a3a22" opacity="0.7"/>
    <rect x="-160" y="-2"  width="320" height="14" fill="#3a2a1c"/>
    <rect x="-160" y="16"  width="320" height="22" fill="#5a3a22" opacity="0.7"/>
    <rect x="-160" y="42"  width="320" height="14" fill="#3a2a1c"/>
    <!-- measurement guides -->
    <line x1="-200" y1="-90" x2="-180" y2="-90" stroke-width="0.6"/>
    <line x1="-200" y1="56"  x2="-180" y2="56"  stroke-width="0.6"/>
    <line x1="-190" y1="-90" x2="-190" y2="56"  stroke-width="0.6"/>
  </g>
  <!-- Thermometer icon -->
  <g transform="translate(160 280)" stroke="url(#c2-gold)" fill="none" stroke-width="1.4" opacity="0.7">
    <rect x="-6" y="-80" width="12" height="120" rx="6"/>
    <circle cx="0" cy="50" r="14" fill="url(#c2-gold)" opacity="0.4"/>
    <line x1="-12" y1="-60" x2="-18" y2="-60"/>
    <line x1="-12" y1="-30" x2="-18" y2="-30"/>
    <line x1="-12" y1="0"   x2="-18" y2="0"/>
    <line x1="-12" y1="30"  x2="-18" y2="30"/>
  </g>
  <!-- Scale icon -->
  <g transform="translate(740 280)" stroke="url(#c2-gold)" fill="none" stroke-width="1.4" opacity="0.7">
    <rect x="-50" y="20" width="100" height="40" rx="4"/>
    <circle cx="0" cy="-10" r="22"/>
    <text x="0" y="-4" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="url(#c2-gold)">°C</text>
  </g>
  <rect x="36" y="36" width="828" height="490" fill="none" stroke="url(#c2-gold)" stroke-width="0.6" opacity="0.45"/>
  <text x="450" y="500" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="6" fill="url(#c2-gold)" opacity="0.85">TECHNIQUES • PROCESS</text>
</svg>
