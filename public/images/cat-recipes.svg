<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 562" width="900" height="562" role="img" aria-label="Рецепты">
  <defs>
    <linearGradient id="c3-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d2615"/>
      <stop offset="60%" stop-color="#1f1308"/>
      <stop offset="100%" stop-color="#0a0604"/>
    </linearGradient>
    <linearGradient id="c3-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0CE8E"/>
      <stop offset="100%" stop-color="#A07636"/>
    </linearGradient>
    <radialGradient id="c3-spot" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#E6C485" stop-opacity="0.18"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="900" height="562" fill="url(#c3-bg)"/>
  <rect width="900" height="562" fill="url(#c3-spot)"/>
  <!-- Open recipe book -->
  <g transform="translate(450 270)">
    <path d="M-200 -120 Q-200 -130 -190 -130 L-10 -130 Q0 -130 0 -120 L0 100 Q0 110 -10 110 L-190 110 Q-200 110 -200 100 Z" fill="#1a0e06" stroke="url(#c3-gold)" stroke-width="1.2"/>
    <path d="M200 -120 Q200 -130 190 -130 L10 -130 Q0 -130 0 -120 L0 100 Q0 110 10 110 L190 110 Q200 110 200 100 Z" fill="#1a0e06" stroke="url(#c3-gold)" stroke-width="1.2"/>
    <!-- Lines on left page -->
    <g stroke="url(#c3-gold)" stroke-width="0.5" opacity="0.55">
      <line x1="-180" y1="-100" x2="-30" y2="-100"/>
      <line x1="-180" y1="-80" x2="-50" y2="-80"/>
      <line x1="-180" y1="-55" x2="-30" y2="-55"/>
      <line x1="-180" y1="-35" x2="-60" y2="-35"/>
      <line x1="-180" y1="-15" x2="-30" y2="-15"/>
      <line x1="-180" y1="5"   x2="-40" y2="5"/>
      <line x1="-180" y1="25"  x2="-30" y2="25"/>
      <line x1="-180" y1="45"  x2="-70" y2="45"/>
      <line x1="-180" y1="65"  x2="-30" y2="65"/>
      <line x1="-180" y1="85"  x2="-50" y2="85"/>
    </g>
    <!-- Decorative ornament on right page -->
    <g transform="translate(100 -10)" stroke="url(#c3-gold)" stroke-width="0.7" fill="none" opacity="0.85">
      <circle r="38"/>
      <circle r="26" opacity="0.6"/>
      <text x="0" y="6" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="22" fill="url(#c3-gold)">№</text>
    </g>
    <line x1="0" y1="-130" x2="0" y2="110" stroke="url(#c3-gold)" stroke-width="0.4" opacity="0.5"/>
  </g>
  <rect x="36" y="36" width="828" height="490" fill="none" stroke="url(#c3-gold)" stroke-width="0.6" opacity="0.45"/>
  <text x="450" y="500" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="6" fill="url(#c3-gold)" opacity="0.85">RECIPES • ASSEMBLY</text>
