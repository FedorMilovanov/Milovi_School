<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Patisserie Russe — French Pastry Archive">
  <defs>
    <linearGradient id="og-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1917"/>
      <stop offset="60%" stop-color="#100c0a"/>
      <stop offset="100%" stop-color="#050403"/>
    </linearGradient>
    <linearGradient id="og-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0CE8E"/>
      <stop offset="100%" stop-color="#A07636"/>
    </linearGradient>
    <radialGradient id="og-spot" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#D4A96A" stop-opacity="0.18"/>
      <stop offset="100%" stop-opacity="0"/>
    </radialGradient>
    <pattern id="og-grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#D4A96A" stroke-width="0.3" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-grid)"/>
  <rect width="1200" height="630" fill="url(#og-spot)"/>
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="url(#og-gold)" stroke-width="0.8" opacity="0.55"/>
  <rect x="58" y="58" width="1084" height="514" fill="none" stroke="url(#og-gold)" stroke-width="0.3" opacity="0.35"/>
  <!-- Crest -->
  <g transform="translate(600 230)">
    <circle r="80" fill="none" stroke="url(#og-gold)" stroke-width="1.2"/>
    <circle r="64" fill="none" stroke="url(#og-gold)" stroke-width="0.5" opacity="0.6"/>
    <text x="0" y="22" text-anchor="middle" font-family="Georgia, serif" font-weight="700" font-size="64" fill="url(#og-gold)" letter-spacing="-2">PR</text>
  </g>
  <!-- Title -->
  <text x="600" y="395" text-anchor="middle" font-family="Georgia, serif" font-weight="600" font-size="64" fill="#F5EAD2" letter-spacing="-2">Patisserie Russe</text>
  <text x="600" y="442" text-anchor="middle" font-family="Georgia, serif" font-style="italic" font-size="26" fill="#D4A96A" opacity="0.9">L'école française de pâtisserie</text>
  <!-- Tagline -->
  <line x1="500" y1="490" x2="700" y2="490" stroke="url(#og-gold)" stroke-width="0.6" opacity="0.7"/>
  <text x="600" y="525" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="14" letter-spacing="6" fill="url(#og-gold)" opacity="0.85">115 ARTICLES • 14 CHEFS • 19 CATEGORIES</text>
  <text x="600" y="555" text-anchor="middle" font-family="ui-monospace, 'SF Mono', monospace" font-size="11" letter-spacing="4" fill="#E8DCC8" opacity="0.55">french.milovicake.ru</text>
</svg>
